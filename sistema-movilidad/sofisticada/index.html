<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPM · Sistema de Movilidad — Alumbrado Público</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0E4D4A; --teal-700:#0a3a37; --teal-900:#06221f; --green:#00A651; --green-d:#00863f;
    --ink:#16201F; --muted:#5d6b69; --line:#e1e8e6; --line-d:#cdd8d5; --bg:#F2F5F4;
    --tint:#E7F1F0; --tint-2:#f4f9f8; --amber:#F4B400; --danger:#c0392b; --blue:#2c7fb8;
    --radius:13px; --shadow:0 1px 2px rgba(16,32,31,.05),0 10px 30px rgba(16,32,31,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
  .num{font-variant-numeric:tabular-nums;font-family:"IBM Plex Mono",monospace}
  h1,h2,h3,h4{font-family:"Space Grotesk",sans-serif;margin:0;letter-spacing:-.015em}
  a{color:inherit}

  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  /* SIDEBAR */
  aside{background:linear-gradient(180deg,var(--teal) 0%,var(--teal-900) 140%);color:#cfeae0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.09)}
  .brand .logo{font-family:"Space Grotesk";font-weight:700;font-size:30px;letter-spacing:-.05em;color:#fff;display:flex;align-items:baseline}
  .brand .logo .reg{font-size:12px;vertical-align:super;color:var(--green);margin-left:1px}
  .brand .gt{font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:#8fd3c0;margin-top:2px}
  .brand .tag{font-size:11.5px;color:#7fc3b1;margin-top:10px;line-height:1.4}
  nav{padding:14px 12px;flex:1;overflow-y:auto}
  .nav-group{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#5f9c8d;font-weight:600;padding:14px 12px 6px;font-family:"Space Grotesk"}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:#cfeae0;transition:.13s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
  .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
  .nav-item.active{background:var(--green);color:#fff;box-shadow:0 4px 14px rgba(0,166,81,.3)}
  .nav-item .ic{width:18px;height:18px;flex:none;opacity:.9}
  .nav-item.active .ic{opacity:1}
  .side-foot{padding:14px 18px;font-size:11px;color:#5f9c8d;border-top:1px solid rgba(255,255,255,.09)}

  /* MAIN */
  main{display:flex;flex-direction:column;min-width:0}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:16px 30px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
  .topbar h1{font-size:20px}
  .topbar .crumb{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:600;display:block;margin-bottom:2px}
  .topbar .actions{margin-left:auto;display:flex;gap:10px}
  .content{padding:28px 30px 70px;max-width:1280px}

  .view{display:none}
  .view.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  /* Buttons */
  .btn{font-family:"Space Grotesk";font-weight:600;font-size:13.5px;border:none;border-radius:10px;padding:10px 17px;cursor:pointer;transition:.14s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal-700)}
  .btn-green{background:var(--green);color:#fff}.btn-green:hover{background:var(--green-d)}
  .btn-ghost{background:#fff;color:var(--teal);border:1px solid var(--line-d)}.btn-ghost:hover{background:var(--tint)}
  .btn-sm{padding:7px 12px;font-size:12.5px}
  .btn-danger{background:#fff;color:var(--danger);border:1px solid #e8c4c0}.btn-danger:hover{background:#fbeae8}

  /* Cards */
  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .card-h h3{font-size:15px}
  .card-h .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--green-d);font-weight:600;display:block;margin-bottom:2px;font-family:"Space Grotesk"}
  .card-b{padding:20px}

  /* KPI grid */
  .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:22px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--green)}
  .kpi.teal::after{background:var(--teal)} .kpi.amber::after{background:var(--amber)} .kpi.blue::after{background:var(--blue)}
  .kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .kpi .val{font-family:"Space Grotesk";font-weight:700;font-size:27px;color:var(--ink);margin-top:6px;font-variant-numeric:tabular-nums}
  .kpi .meta{font-size:11.5px;color:var(--muted);margin-top:3px}

  .row2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .row-1-2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
  @media(max-width:980px){.row2,.row-1-2{grid-template-columns:1fr}}

  /* Charts */
  .bar-row{display:grid;grid-template-columns:130px 1fr 86px;align-items:center;gap:12px;margin-bottom:11px;font-size:12.5px}
  .bar-row .blab{color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bar-track{background:var(--tint);border-radius:6px;height:22px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .5s ease}
  .bar-val{text-align:right;font-family:"IBM Plex Mono";font-size:12px;color:var(--teal);font-weight:600}

  /* Tables */
  .tablecard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:var(--teal);color:#dff3ec;text-align:left;padding:12px 14px;font-family:"Space Grotesk";font-weight:600;font-size:11.5px;letter-spacing:.02em;position:sticky;top:0}
  thead th.r{text-align:right}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line)}
  tbody tr:hover{background:var(--tint-2)}
  td.r{text-align:right}
  .tcode{font-family:"IBM Plex Mono";font-weight:600;color:var(--teal)}
  .clickrow{cursor:pointer}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;font-family:"Space Grotesk"}
  .chip.cerrada{background:var(--tint);color:var(--teal)} .chip.abierta{background:#fff4d6;color:#9a7400}
  .pill{display:inline-block;background:var(--tint);color:var(--teal);font-size:11px;font-weight:600;padding:2px 9px;border-radius:6px;font-family:"IBM Plex Mono"}

  /* Filters */
  .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
  label{font-size:11.5px;font-weight:600;color:var(--ink);display:block;margin-bottom:5px}
  input,select{width:100%;padding:9px 11px;border:1px solid var(--line-d);border-radius:9px;font:inherit;font-size:13px;color:var(--ink);background:#fff;transition:.14s}
  input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,77,74,.12)}
  input[readonly]{background:var(--bg);color:var(--muted)}
  .search{position:relative}
  .search input{padding-left:34px}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}

  .empty{padding:40px;text-align:center;color:var(--muted);font-size:13.5px}

  /* Wizard / create */
  .wiz{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
  @media(max-width:980px){.wiz{grid-template-columns:1fr}}
  .form-sec{margin-bottom:22px}
  .form-sec .sh{font-family:"Space Grotesk";font-weight:600;font-size:14px;color:var(--teal);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .form-sec .sh .n{width:22px;height:22px;border-radius:6px;background:var(--teal);color:#fff;display:grid;place-items:center;font-size:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:680px){.grid3,.grid2{grid-template-columns:1fr}}
  .addbar{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:14px;display:grid;grid-template-columns:1fr 96px auto;gap:11px;align-items:end;margin-bottom:14px}
  @media(max-width:680px){.addbar{grid-template-columns:1fr}}
  .lineitem{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:8px;font-size:13px;background:#fff}
  .lineitem .li-code{font-family:"IBM Plex Mono";font-weight:600;color:var(--teal);flex:none}
  .lineitem .li-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lineitem .li-qty{color:var(--muted);flex:none}
  .lineitem .li-tot{font-family:"IBM Plex Mono";font-weight:600;flex:none;min-width:90px;text-align:right}
  .del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;line-height:1;padding:2px 7px;border-radius:6px}
  .del:hover{background:#fbeae8}

  .livecard{position:sticky;top:90px}
  .sumrow{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px dashed var(--line)}
  .sumrow:last-of-type{border:none}
  .sumrow.total{margin-top:4px;padding-top:11px;border-top:2px solid var(--teal);font-family:"Space Grotesk";font-weight:700;font-size:17px;color:var(--teal)}
  .sumrow .num{font-weight:600}

  /* Detail report */
  .meta{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 24px;margin-bottom:6px}
  @media(max-width:680px){.meta{grid-template-columns:1fr 1fr}}
  .meta .m span{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;display:block}
  .meta .m b{font-size:14px;font-weight:600}
  .sec-title{font-family:"Space Grotesk";font-weight:600;font-size:14px;margin:24px 0 11px;color:var(--teal);display:flex;align-items:center;gap:8px}
  .sec-title::before{content:"";width:14px;height:2px;background:var(--green)}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(6,34,31,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(2px)}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:var(--radius);width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:fade .2s}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line)}
  .modal-h h3{font-size:16px}
  .modal-b{padding:22px}
  .modal-f{padding:16px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

  /* toast */
  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:500;opacity:0;transition:.3s;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media print{
    aside,.topbar .actions,.no-print{display:none!important}
    .app{grid-template-columns:1fr}
    .content{padding:0}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside>
    <div class="brand">
      <div class="logo">epm<span class="reg">®</span></div>
      <div class="gt">Guatemala</div>
      <div class="tag">Sistema de movilidad<br>Fallas y mantenimientos · Alumbrado público</div>
    </div>
    <nav>
      <div class="nav-group">Operación</div>
      <button class="nav-item active" data-view="dashboard" onclick="nav('dashboard')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</button>
      <button class="nav-item" data-view="ordenes" onclick="nav('ordenes')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>Órdenes de trabajo</button>
      <button class="nav-item" data-view="nueva" onclick="nav('nueva')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>Nueva orden</button>
      <div class="nav-group">Datos maestros</div>
      <button class="nav-item" data-view="actividades" onclick="nav('actividades')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Preciario actividades</button>
      <button class="nav-item" data-view="materiales" onclick="nav('materiales')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.7l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.7l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>Catálogo materiales</button>
      <div class="nav-group">Análisis</div>
      <button class="nav-item" data-view="reportes" onclick="nav('reportes')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>Reporte integrado</button>
      <button class="nav-item" data-view="basedatos" onclick="nav('basedatos')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></svg>Base de datos</button>
    </nav>
    <div class="side-foot">Confidencial EPM Guatemala<br>Demo POC · v2.0</div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="topbar">
      <div><span class="crumb" id="crumb">Operación</span><h1 id="ptitle">Dashboard</h1></div>
      <div class="actions" id="topActions"></div>
    </div>
    <div class="content">

      <!-- DASHBOARD -->
      <section class="view active" id="v-dashboard"></section>

      <!-- ÓRDENES -->
      <section class="view" id="v-ordenes">
        <div class="filters">
          <div class="search"><label>Buscar</label>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input id="o_search" placeholder="N.° de orden o técnico" oninput="renderOrdenes()"></div>
          <div><label>Contratista</label><select id="o_contr" onchange="renderOrdenes()"></select></div>
          <div><label>Distrito</label><select id="o_dist" onchange="renderOrdenes()"></select></div>
          <div><label>Estado</label><select id="o_estado" onchange="renderOrdenes()"><option value="">Todos</option><option>Cerrada</option><option>Abierta</option></select></div>
        </div>
        <div id="ordenesTable"></div>
      </section>

      <!-- NUEVA ORDEN -->
      <section class="view" id="v-nueva"></section>

      <!-- DETALLE -->
      <section class="view" id="v-detalle"></section>

      <!-- ACTIVIDADES -->
      <section class="view" id="v-actividades">
        <div class="filters" style="grid-template-columns:1fr auto">
          <div class="search"><label>Buscar actividad</label>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input id="ac_search" placeholder="Código o descripción" oninput="renderActCat()"></div>
          <div style="display:flex;align-items:end;gap:8px;flex-wrap:wrap">
            <label class="btn btn-primary" style="cursor:pointer">Importar<input type="file" accept=".csv,.xlsx,.xls,.txt" style="display:none" onchange="onPick(this,'act')"></label>
            <button class="btn btn-ghost" onclick="tplCSV('act')">Plantilla</button>
            <button class="btn btn-green" onclick="openItemModal('act')">+ Nueva</button>
          </div>
        </div>
        <div id="actCatTable"></div>
      </section>

      <!-- MATERIALES -->
      <section class="view" id="v-materiales">
        <div class="filters" style="grid-template-columns:1fr auto">
          <div class="search"><label>Buscar material</label>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
            <input id="ma_search" placeholder="Código o descripción" oninput="renderMatCat()"></div>
          <div style="display:flex;align-items:end;gap:8px;flex-wrap:wrap">
            <label class="btn btn-primary" style="cursor:pointer">Importar<input type="file" accept=".csv,.xlsx,.xls,.txt" style="display:none" onchange="onPick(this,'mat')"></label>
            <button class="btn btn-ghost" onclick="tplCSV('mat')">Plantilla</button>
            <button class="btn btn-green" onclick="openItemModal('mat')">+ Nuevo</button>
          </div>
        </div>
        <div id="matCatTable"></div>
      </section>

      <!-- REPORTES -->
      <section class="view" id="v-reportes"></section>

      <!-- BASE DE DATOS -->
      <section class="view" id="v-basedatos"></section>

    </div>
  </main>
</div>

<!-- MODAL catálogo -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-h"><h3 id="modalTitle">Nuevo ítem</h3></div>
    <div class="modal-b">
      <div style="margin-bottom:14px"><label>Código</label><input id="mi_code"></div>
      <div style="margin-bottom:14px"><label>Descripción</label><input id="mi_desc"></div>
      <div><label>Precio sin IVA (Q)</label><input id="mi_price" type="number" step="0.01" min="0"></div>
      <input type="hidden" id="mi_kind"><input type="hidden" id="mi_orig">
    </div>
    <div class="modal-f">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-green" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===================== DATOS ===================== */
/* El preciario de actividades y el catálogo de materiales vienen
   precargados. Las ÓRDENES inician vacías. Ambos catálogos se pueden
   reemplazar importando un CSV/Excel desde la sección de catálogos. */
const SEED_ACT = [
  ["APG01","Apertura de agujero para poste",353.76],["APG02","Aplomado de poste de 30 - 35 pies madera o concreto",918.20],
  ["APG03","Bajada secundaria con tubo HG de 2\" pulgadas",1583.73],["APG04","Cambio de balastro de luminaria",255.01],
  ["APG05","Cambio de brazo",375.34],["APG06","Cambio de cabeza de luminaria",170.62],
  ["APG07","Cambio de cableado y conexiones subterráneas",424.67],["APG08","Cambio de contactor",645.58],
  ["APG09","Cambio de driver LED",329.73],["APG10","Cambio de flipón",262.34],
  ["APG11","Cambio de fusibles en el relevador",171.22],["APG12","Cambio de herrajes varios unitario",183.83],
  ["APG13","Cambio de luminaria completa con brazo de 2 a 6'",375.34],["APG14","Cambio de luminaria completa con brazo de 8 a 12'",390.55],
  ["APG15","Cambio de luminaria de pared (Wallpack o luminaria de techo)",341.22],["APG16","Cambio de módulos LED",329.73],
  ["APG17","Cambio de poste de 30 - 35 pies concreto",2215.91],["APG18","Cambio de poste de 30 - 35 pies madera",2063.81],

/* ---- importación de catálogos (CSV o Excel) ---- */
function cleanPrice(v){ if(typeof v==="number")return v; let s=String(v).replace(/[^0-9.,-]/g,"").trim(); if(s.includes(",")&&s.includes("."))s=s.replace(/,/g,""); else if(s.includes(","))s=s.replace(/\./g,"").replace(",","."); const n=parseFloat(s); return isNaN(n)?null:n; }
function parseCSV(text){ text=text.replace(/\r/g,""); const first=(text.split("\n").find(l=>l.trim())||""); const delim=(first.split(";").length>first.split(",").length)?";":","; return text.split("\n").map(line=>{ const cells=[];let cur="",q=false,start=true; for(let i=0;i<line.length;i++){const ch=line[i]; if(ch==='"'){ if(q){ if(line[i+1]==='"'){cur+='"';i++;} else q=false; } else if(start){ q=true; } else { cur+='"'; } start=false; } else if(ch===delim&&!q){ cells.push(cur);cur="";start=true; } else { cur+=ch; start=false; } } cells.push(cur); return cells; }); }
function rowsToCatalog(rows){ const out=[]; (rows||[]).forEach(r=>{ const cells=(r||[]).map(c=>c==null?"":String(c).trim()); while(cells.length&&cells[cells.length-1]==="")cells.pop(); if(!cells.length)return; let pi=-1,price=null; for(let i=cells.length-1;i>=0;i--){ if(/\d/.test(cells[i])){const n=cleanPrice(cells[i]); if(n!=null){pi=i;price=n;break;}} } if(pi<1)return; const code=cells[0]; if(!code||/^[ií]tem$|^c[oó]digo$|^item$/i.test(code))return; const desc=cells.slice(1,pi).join(" ").trim()||code; out.push({codigo:code,desc,precio:price}); }); return out; }
function applyCatalog(items,target,fname){ if(!items.length){toast('No se encontraron filas válidas en "'+fname+'"');return;} if(target==="act")DB.act=items; else DB.mat=items; save(); toast(items.length+(target==="act"?" actividades importadas":" materiales importados")); target==="act"?renderActCat():renderMatCat(); }
function importFile(file,target){ const ext=file.name.split(".").pop().toLowerCase();
  if(ext==="csv"||ext==="txt"){ const rd=new FileReader(); rd.onload=e=>applyCatalog(rowsToCatalog(parseCSV(e.target.result)),target,file.name); rd.readAsText(file,"utf-8"); }
  else if(ext==="xlsx"||ext==="xls"){ if(typeof XLSX==="undefined"){toast("Para Excel se requiere conexión; usa CSV sin conexión");return;} const rd=new FileReader(); rd.onload=e=>{ const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]]; applyCatalog(rowsToCatalog(XLSX.utils.sheet_to_json(ws,{header:1,defval:""})),target,file.name); }; rd.readAsArrayBuffer(file); }
  else toast("Formato no soportado: usa CSV o Excel"); }
function onPick(input,target){ if(input.files[0]) importFile(input.files[0],target); input.value=""; }
function tplCSV(kind){ const head=kind==="act"?["Ítem","Descripción de la actividad","Precio sin IVA"]:["Ítem","Descripción del material","Precio sin IVA"]; const ex=kind==="act"?[["APG01","Apertura de agujero para poste","353.76"]]:[["310391","Cable Duplex 6 ACSR con forro","100.00"]]; const csv="\uFEFF"+[head,...ex].map(r=>r.map(c=>`"${c}"`).join(";")).join("\n"); const b=new Blob([csv],{type:"text/csv;charset=utf-8"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download=(kind==="act"?"plantilla_actividades":"plantilla_materiales")+".csv"; a.click(); }

function load(){
  try{ DB=JSON.parse(localStorage.getItem(KEY)); }catch(e){ DB=null; }
  if(!DB || !Array.isArray(DB.act)){ DB={ act:SEED_ACT, mat:SEED_MAT, ord:[], dbcfg:{fabricante:"",motor:"",tipo:""}, ver:VER }; save(); return; }
  if(!DB.act.length){ DB.act=SEED_ACT; DB.mat=SEED_MAT; }
  if(DB.ver!==VER){ DB.ord=(DB.ord||[]).filter(o=>!DEMO_OTS.includes(o.ot)); DB.ver=VER; }  // quitar órdenes de ejemplo de versiones previas
  if(!DB.dbcfg) DB.dbcfg={fabricante:"",motor:"",tipo:""};
  save();
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} }

/* helpers de cálculo */
const actPrice = c => (DB.act.find(a=>a.codigo===c)||{}).precio||0;
const actDesc  = c => (DB.act.find(a=>a.codigo===c)||{}).desc||c;
const matPrice = c => (DB.mat.find(m=>m.codigo===c)||{}).precio||0;
const matDesc  = c => (DB.mat.find(m=>m.codigo===c)||{}).desc||c;
function orderTotals(o){
  const ca=o.acts.reduce((s,[c,q])=>s+actPrice(c)*q,0);
  const cm=o.mats.reduce((s,[c,q])=>s+matPrice(c)*q,0);
  const sub=ca+cm;
  return {ca,cm,sub,iva:sub*IVA,total:sub*(1+IVA),
    nAct:o.acts.length,nMat:o.mats.length,
    qAct:o.acts.reduce((s,[,q])=>s+q,0),qMat:o.mats.reduce((s,[,q])=>s+q,0)};
}

function aggregate(orders){
  const byContr={},byZona={},byAct={},byMat={},byFecha={};
  let costAct=0,costMat=0,nAct=0,nMat=0;
  orders.forEach(o=>{
    const t=orderTotals(o);
    costAct+=t.ca; costMat+=t.cm; nAct+=t.qAct; nMat+=t.qMat;
    byContr[o.contratista]=(byContr[o.contratista]||0)+t.sub;
    byZona[o.distrito]=(byZona[o.distrito]||0)+t.sub;
    byFecha[o.fecha]=(byFecha[o.fecha]||0)+t.qAct;
    o.acts.forEach(([c,q])=>byAct[c]=(byAct[c]||0)+actPrice(c)*q);
    o.mats.forEach(([c,q])=>byMat[c]=(byMat[c]||0)+q);
  });
  return {byContr,byZona,byAct,byMat,byFecha,costAct,costMat,nAct,nMat,
    sub:costAct+costMat,iva:(costAct+costMat)*IVA,total:(costAct+costMat)*(1+IVA),
    nOrd:orders.length};
}
function barChart(obj,{fmt=Q,top=6,label=v=>v}={}){
  const entries=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,top);
  if(!entries.length) return '<div class="empty">Sin datos.</div>';
  const max=Math.max(...entries.map(e=>e[1]))||1;
  return entries.map(([k,v])=>`<div class="bar-row">
    <div class="blab" title="${label(k)}">${label(k)}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,v/max*100)}%"></div></div>
    <div class="bar-val">${fmt(v)}</div></div>`).join("");
}

            <div><label>Dirección / ubicación</label><input id="n_dir" placeholder="Ej. Avenida Reforma, Zona 10"></div>
            <div><label>Tipo de trabajo</label><select id="n_tipo"><option selected>Alumbrado Público</option><option>Mantenimiento correctivo</option><option>Mantenimiento preventivo</option></select></div>
          </div>
        </div>

        <div class="form-sec">
          <div class="sh"><span class="n">2</span> Actividades ejecutadas</div>
          <div class="addbar">
            <div><label>Actividad (preciario)</label><select id="n_actsel">${DB.act.map(a=>`<option value="${a.codigo}">${a.codigo} · ${a.desc} — ${Q(a.precio)}</option>`).join("")}</select></div>
            <div><label>Cantidad</label><input id="n_actqty" type="number" min="1" value="1"></div>
            <div><button class="btn btn-green" onclick="addLine('acts')">+ Agregar</button></div>
          </div>
          <div id="n_actlist"></div>
        </div>

        <div class="form-sec" style="margin-bottom:0">
          <div class="sh"><span class="n">3</span> Materiales utilizados</div>
          <div class="addbar">
            <div><label>Material (catálogo)</label><select id="n_matsel">${DB.mat.map(m=>`<option value="${m.codigo}">${m.codigo} · ${m.desc} — ${Q(m.precio)}</option>`).join("")}</select></div>
            <div><label>Cantidad</label><input id="n_matqty" type="number" min="1" value="1"></div>
            <div><button class="btn btn-green" onclick="addLine('mats')">+ Agregar</button></div>
          </div>
          <div id="n_matlist"></div>
        </div>
      </div></div>
    </div>

    <div class="livecard">
      <div class="card"><div class="card-h"><div><span class="eyebrow">Consolidado en vivo</span><h3>Resumen de costos</h3></div></div>
        <div class="card-b" id="n_summary"></div>
        <div class="card-b" style="border-top:1px solid var(--line);padding-top:16px">
          <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="saveDraft()">Guardar orden de trabajo</button>
        </div>
      </div>
    </div>
  </div>`;
  renderDraft();
}
function addLine(kind){
  const sel=$(kind==="acts"?"n_actsel":"n_matsel").value;
  if(!sel){toast("Importa primero el catálogo correspondiente");return;}
  const qty=Math.max(1,parseInt($(kind==="acts"?"n_actqty":"n_matqty").value)||1);
  const ex=draft[kind].find(l=>l[0]===sel);
  if(ex) ex[1]+=qty; else draft[kind].push([sel,qty]);
  $(kind==="acts"?"n_actqty":"n_matqty").value=1;
  renderDraft();
}
function delLine(kind,c){ draft[kind]=draft[kind].filter(l=>l[0]!==c); renderDraft(); }
function renderDraft(){
  const aL=draft.acts.map(([c,q])=>`<div class="lineitem"><span class="li-code">${c}</span><span class="li-desc">${actDesc(c)}</span><span class="li-qty">×${q}</span><span class="li-tot">${Q(actPrice(c)*q)}</span><button class="del" onclick="delLine('acts','${c}')">×</button></div>`).join("")||'<p style="font-size:12.5px;color:var(--muted)">Sin actividades agregadas.</p>';
  const mL=draft.mats.map(([c,q])=>`<div class="lineitem"><span class="li-code">${c}</span><span class="li-desc">${matDesc(c)}</span><span class="li-qty">×${q}</span><span class="li-tot">${Q(matPrice(c)*q)}</span><button class="del" onclick="delLine('mats','${c}')">×</button></div>`).join("")||'<p style="font-size:12.5px;color:var(--muted)">Sin materiales agregados.</p>';
  $("n_actlist").innerHTML=aL; $("n_matlist").innerHTML=mL;
  const t=orderTotals(draft);
  $("n_summary").innerHTML=`
    <div class="sumrow"><span>Actividades (${t.qAct})</span><span class="num">${Q(t.ca)}</span></div>
    <div class="sumrow"><span>Materiales (${t.qMat})</span><span class="num">${Q(t.cm)}</span></div>
    <div class="sumrow"><span>Subtotal sin IVA</span><span class="num">${Q(t.sub)}</span></div>
    <div class="sumrow"><span>IVA (12%)</span><span class="num">${Q(t.iva)}</span></div>
    <div class="sumrow total"><span>Total</span><span class="num">${Q(t.total)}</span></div>`;
}
function saveDraft(){
  const contr=$("n_contr").value.trim(), fecha=$("n_fecha").value;
  if(!fecha){toast("Indica la fecha de ejecución");return;}
  if(!contr){toast("Indica el contratista");return;}
  if(!draft.acts.length && !draft.mats.length){toast("Agrega al menos una actividad o material");return;}
  const o={ot:$("n_ot").value,fecha,estado:$("n_estado").value,contratista:contr,
    tecnico:$("n_tec").value.trim()||"—",distrito:$("n_dist").value.trim()||"—",
    dir:$("n_dir").value.trim()||"—",tipo:$("n_tipo").value,
    acts:draft.acts.slice(),mats:draft.mats.slice()};
  DB.ord.push(o); save();
  toast("Orden "+o.ot+" guardada"); openDetalle(o.ot);
}

/* ===================== CATÁLOGOS ===================== */
function renderActCat(){
  const q=($("ac_search").value||"").toLowerCase();
  const list=DB.act.filter(a=>a.codigo.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q));
  $("actCatTable").innerHTML=`<div class="tablecard"><table><thead><tr><th>Ítem</th><th>Descripción de la actividad</th><th class="r">Precio sin IVA</th><th class="r">Acciones</th></tr></thead><tbody>
  ${list.length?list.map(a=>`<tr><td class="tcode">${a.codigo}</td><td>${a.desc}</td><td class="r num">${Q(a.precio)}</td>
    <td class="r"><button class="btn btn-ghost btn-sm" onclick="editItem('act','${a.codigo}')">Editar</button>
    <button class="btn btn-danger btn-sm" onclick="delCatItem('act','${a.codigo}')">Eliminar</button></td></tr>`).join(""):'<tr><td colspan="4" class="empty">Sin resultados.</td></tr>'}
  </tbody></table></div><p style="font-size:11.5px;color:var(--muted);margin-top:12px">${DB.act.length} actividades en el preciario · Los cambios se aplican sin modificar la app móvil.</p>`;
}
function renderMatCat(){
  const q=($("ma_search").value||"").toLowerCase();
  const list=DB.mat.filter(m=>m.codigo.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q));
  $("matCatTable").innerHTML=`<div class="tablecard"><table><thead><tr><th>Ítem</th><th>Descripción del material</th><th class="r">Precio sin IVA</th><th class="r">Acciones</th></tr></thead><tbody>
  ${list.length?list.map(m=>`<tr><td class="tcode">${m.codigo}</td><td>${m.desc}</td><td class="r num">${Q(m.precio)}</td>
    <td class="r"><button class="btn btn-ghost btn-sm" onclick="editItem('mat','${m.codigo}')">Editar</button>
    <button class="btn btn-danger btn-sm" onclick="delCatItem('mat','${m.codigo}')">Eliminar</button></td></tr>`).join(""):'<tr><td colspan="4" class="empty">Sin resultados.</td></tr>'}
  </tbody></table></div><p style="font-size:11.5px;color:var(--muted);margin-top:12px">${DB.mat.length} materiales en el catálogo.</p>`;
}
function openItemModal(kind){
  $("mi_kind").value=kind; $("mi_orig").value="";
  $("modalTitle").textContent=kind==="act"?"Nueva actividad":"Nuevo material";
  $("mi_code").value="";$("mi_desc").value="";$("mi_price").value="";$("mi_code").readOnly=false;
  $("modalBg").classList.add("open");
}
function editItem(kind,code){
  const arr=kind==="act"?DB.act:DB.mat; const it=arr.find(x=>x.codigo===code);
  $("mi_kind").value=kind; $("mi_orig").value=code;
  $("modalTitle").textContent="Editar "+(kind==="act"?"actividad":"material");
  $("mi_code").value=it.codigo;$("mi_desc").value=it.desc;$("mi_price").value=it.precio;$("mi_code").readOnly=true;
  $("modalBg").classList.add("open");
}
function closeModal(){$("modalBg").classList.remove("open");}
function saveItem(){
  const kind=$("mi_kind").value, orig=$("mi_orig").value;
  const code=$("mi_code").value.trim(), desc=$("mi_desc").value.trim(), price=parseFloat($("mi_price").value);
  if(!code||!desc||isNaN(price)){toast("Completa código, descripción y precio");return;}
  const arr=kind==="act"?DB.act:DB.mat;
  if(orig){ const it=arr.find(x=>x.codigo===orig); it.desc=desc; it.precio=price; }
  else { if(arr.some(x=>x.codigo===code)){toast("Ese código ya existe");return;} arr.push({codigo:code,desc,precio:price}); }
  save(); closeModal(); toast("Catálogo actualizado");
  kind==="act"?renderActCat():renderMatCat();
}
function delCatItem(kind,code){
  const used=DB.ord.some(o=>(kind==="act"?o.acts:o.mats).some(l=>l[0]===code));
  if(used){toast("No se puede eliminar: está en uso en órdenes");return;}
  if(!confirm("Eliminar "+code+"?"))return;
  if(kind==="act") DB.act=DB.act.filter(x=>x.codigo!==code); else DB.mat=DB.mat.filter(x=>x.codigo!==code);
  save(); kind==="act"?renderActCat():renderMatCat(); toast("Eliminado");
}

/* ===================== REPORTE INTEGRADO ===================== */
function renderReportes(){
  const contr=[...new Set(DB.ord.map(o=>o.contratista))].sort();
  const dist=[...new Set(DB.ord.map(o=>o.distrito))].sort();
  $("v-reportes").innerHTML=`
    <div class="card no-print" style="margin-bottom:20px"><div class="card-h"><h3>Filtros de consulta</h3></div>
      <div class="card-b"><div class="filters" style="margin:0">
        <div><label>Fecha desde</label><input id="r_d1" type="date" value="2026-06-01" onchange="renderReportes()"></div>
        <div><label>Fecha hasta</label><input id="r_d2" type="date" value="2026-06-30" onchange="renderReportes()"></div>
        <div><label>Contratista</label><select id="r_contr" onchange="renderReportes()"><option value="">Todos</option>${contr.map(c=>`<option ${rState.contr===c?'selected':''}>${c}</option>`).join("")}</select></div>
        <div><label>Distrito</label><select id="r_dist" onchange="renderReportes()"><option value="">Todos</option>${dist.map(c=>`<option ${rState.dist===c?'selected':''}>${c}</option>`).join("")}</select></div>
        <div><label>Estado OT</label><select id="r_estado" onchange="renderReportes()"><option value="">Todos</option><option ${rState.estado==='Cerrada'?'selected':''}>Cerrada</option><option ${rState.estado==='Abierta'?'selected':''}>Abierta</option></select></div>
        <div><label>Costo mínimo (s/IVA)</label><input id="r_min" type="number" placeholder="0" value="${rState.min}" oninput="renderReportes()"></div>
      </div></div>
    </div>
    <div id="reportBody"></div>`;
  // restaurar valores de fecha si existían
  if(rState.d1)$("r_d1").value=rState.d1; if(rState.d2)$("r_d2").value=rState.d2;
  computeReport();
}
let rState={contr:"",dist:"",estado:"",min:"",d1:"",d2:""};
function readRState(){
  rState={contr:$("r_contr").value,dist:$("r_dist").value,estado:$("r_estado").value,
    min:$("r_min").value,d1:$("r_d1").value,d2:$("r_d2").value};
}
function filteredReportOrders(){
  return DB.ord.filter(o=>{
    if(rState.d1 && o.fecha<rState.d1)return false;
    if(rState.d2 && o.fecha>rState.d2)return false;
    if(rState.contr && o.contratista!==rState.contr)return false;
    if(rState.dist && o.distrito!==rState.dist)return false;
    if(rState.estado && o.estado!==rState.estado)return false;
    if(rState.min && orderTotals(o).sub<parseFloat(rState.min))return false;
    return true;
  }).sort((x,y)=>y.fecha.localeCompare(x.fecha));
}
function computeReport(){
  readRState();
  const list=filteredReportOrders(); const a=aggregate(list);
  $("reportBody").innerHTML=`
    <div class="kgrid">
      <div class="kpi teal"><div class="lbl">Órdenes</div><div class="val">${a.nOrd}</div></div>
      <div class="kpi"><div class="lbl">Actividades</div><div class="val">${a.nAct}</div></div>
      <div class="kpi blue"><div class="lbl">Materiales</div><div class="val">${a.nMat}</div></div>
      <div class="kpi amber"><div class="lbl">Total con IVA</div><div class="val" style="font-size:21px">${Q(a.total)}</div></div>
    </div>
    <div class="row-1-2">
      <div class="tablecard"><table><thead><tr><th>Orden</th><th>Fecha</th><th>Contratista</th><th class="r">Activ.</th><th class="r">C. Activ.</th><th class="r">C. Mater.</th><th class="r">Total</th></tr></thead><tbody>
      ${list.length?list.map(o=>{const t=orderTotals(o);return `<tr class="clickrow" onclick="openDetalle('${o.ot}')"><td class="tcode">${o.ot}</td><td>${o.fecha}</td><td>${o.contratista}</td><td class="r num">${t.qAct}</td><td class="r num">${Q(t.ca)}</td><td class="r num">${Q(t.cm)}</td><td class="r num">${Q(t.total)}</td></tr>`;}).join(""):'<tr><td colspan="7" class="empty">Ninguna orden cumple los filtros.</td></tr>'}
      </tbody></table></div>
      <div class="card"><div class="card-h"><h3>Resumen ejecutivo</h3></div><div class="card-b">
        <div class="sumrow"><span>Costo actividades</span><span class="num">${Q(a.costAct)}</span></div>
        <div class="sumrow"><span>Costo materiales</span><span class="num">${Q(a.costMat)}</span></div>
        <div class="sumrow"><span>Subtotal (sin IVA)</span><span class="num">${Q(a.sub)}</span></div>
        <div class="sumrow"><span>IVA (12%)</span><span class="num">${Q(a.iva)}</span></div>
        <div class="sumrow total"><span>Total general</span><span class="num">${Q(a.total)}</span></div>
        <div class="sumrow" style="margin-top:12px"><span>Costo promedio por OT</span><span class="num">${Q(a.nOrd?a.sub/a.nOrd:0)}</span></div>
      </div></div>
    </div>`;
}
function exportReportCSV(){
  readRState(); const list=filteredReportOrders(); const L=[];
  L.push(["Reporte integrado de costos por orden de trabajo"]);
  L.push(["Filtros",`${rState.d1||"-"} a ${rState.d2||"-"}`,rState.contr||"Todos",rState.dist||"Todos",rState.estado||"Todos"]);
  L.push([]);
  L.push(["Orden","Fecha","Contratista","Distrito","Estado","Costo actividades","Costo materiales","Subtotal","IVA","Total"]);
  list.forEach(o=>{const t=orderTotals(o);L.push([o.ot,o.fecha,o.contratista,o.distrito,o.estado,t.ca.toFixed(2),t.cm.toFixed(2),t.sub.toFixed(2),t.iva.toFixed(2),t.total.toFixed(2)]);});
  downloadCSV(L,"reporte_integrado.csv");
}
function exportOrderCSV(ot){
  const o=DB.ord.find(x=>x.ot===ot); const t=orderTotals(o); const L=[];
  L.push(["Reporte detallado de costos por orden de trabajo"]);
  L.push(["Orden",o.ot,"Fecha",o.fecha,"Estado",o.estado]);
  L.push(["Contratista",o.contratista,"Técnico",o.tecnico,"Distrito",o.distrito]);
  L.push([]);L.push(["ACTIVIDADES"]);L.push(["Código","Descripción","Cantidad","Precio unit.","Costo total"]);
  o.acts.forEach(([c,q])=>L.push([c,actDesc(c),q,actPrice(c).toFixed(2),(actPrice(c)*q).toFixed(2)]));
  L.push([]);L.push(["MATERIALES"]);L.push(["Código","Descripción","Cantidad","Precio unit.","Costo total"]);
  o.mats.forEach(([c,q])=>L.push([c,matDesc(c),q,matPrice(c).toFixed(2),(matPrice(c)*q).toFixed(2)]));
  L.push([]);L.push(["Subtotal sin IVA",t.sub.toFixed(2)]);L.push(["IVA 12%",t.iva.toFixed(2)]);L.push(["Total con IVA",t.total.toFixed(2)]);
  downloadCSV(L,o.ot+".csv");
}
function downloadCSV(rows,name){
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();
  toast("Archivo exportado");
}

  const c=DB.dbcfg;
  $("v-basedatos").innerHTML=`
    <div class="row-1-2">
      <div class="card"><div class="card-h"><div><span class="eyebrow">Configuración</span><h3>Motor de base de datos</h3></div></div>
        <div class="card-b">
          <p style="font-size:13px;color:var(--muted);margin:0 0 18px">Especifica el fabricante y motor de base de datos (SQL, NoSQL o equivalente) que soporta la solución de movilidad.</p>
          <div class="grid3" style="grid-template-columns:1fr">
            <div style="margin-bottom:14px"><label>Fabricante</label><input id="db_fab" value="${c.fabricante}"></div>
            <div style="margin-bottom:14px"><label>Motor de base de datos</label><input id="db_motor" value="${c.motor}"></div>

              <select id="db_tipo">
                <option ${/SQL \(rel/.test(c.tipo)?'selected':''}>SQL (relacional)</option>
                <option ${/NoSQL/.test(c.tipo)?'selected':''}>NoSQL</option>
                <option ${/SQL$/.test(c.tipo)?'selected':''}>SQL</option>

        <div class="sumrow"><span>Actividades en preciario</span><span class="num">${DB.act.length}</span></div>
        <div class="sumrow"><span>Materiales en catálogo</span><span class="num">${DB.mat.length}</span></div>
        <div class="sumrow"><span>Almacenamiento</span><span class="pill">localStorage</span></div>
        <p style="font-size:12px;color:var(--muted);margin:16px 0 12px">Los datos se guardan localmente en este navegador (localStorage). El preciario y el catálogo se conservan; solo se borran las órdenes.</p>

function saveDB(){
  DB.dbcfg={fabricante:$("db_fab").value,motor:$("db_motor").value,tipo:$("db_tipo").value};
  save(); toast("Configuración guardada");
}

/* ===================== UTIL ===================== */
let toastT;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }
function renderAll(){ fillFilterSelects(); }
$("modalBg").addEventListener("click",e=>{if(e.target===$("modalBg"))closeModal();});

/* INIT */
load(); renderAll(); nav("dashboard");
</script>
