<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubicquia · Work Orders — Advanced</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --db:#1E2445;  --db2:#161b36;  --ub:#22B0E1;  --ub-d:#189ec9;
  --dg:#005B59;  --lg:#AECC53;   --lg-d:#96b042;
  --ink:#1a1f3a; --muted:#5a6278; --line:#e2e6f0; --line-d:#cdd3e2;
  --bg:#EEF0F5;  --tint:#e0f4fb;  --tint2:#f0f9fd; --tint3:#f5f9ee;
  --amber:#FAB512; --danger:#c0392b; --gray:#464D63; --lgray:#99A0B4;
  --radius:12px;
  --shadow:0 1px 3px rgba(30,36,69,.06),0 8px 28px rgba(30,36,69,.07);
}
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%}
body{font-family:"Lato",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55;-webkit-font-smoothing:antialiased}
.mono{font-family:"Lato",ui-monospace,monospace;letter-spacing:.01em}
.num{font-variant-numeric:tabular-nums}
h1,h2,h3,h4{font-family:"Lato",sans-serif;margin:0;font-weight:700;letter-spacing:-.01em}
.eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ub);font-weight:700;font-family:"Lato";display:block}

/* ── APP SHELL ── */
.app{display:grid;grid-template-columns:256px 1fr;min-height:100vh}
aside{background:linear-gradient(175deg,var(--db) 0%,var(--db2) 100%);color:#c8d4f0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}

/* ── BRAND ── */
.brand{padding:22px 22px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.brand-logo{display:flex;align-items:center;gap:0}
.brand-logo .ubi{font-family:"Lato";font-weight:300;font-size:22px;color:#fff;letter-spacing:-.01em}
.brand-logo .cquia{font-family:"Lato";font-weight:900;font-size:22px;color:var(--ub);letter-spacing:-.01em}
.brand-logo .dot{color:var(--ub);font-size:22px;font-weight:900;margin-left:1px}
.brand-sub{font-size:10.5px;color:#7a90c8;font-weight:400;margin-top:3px;letter-spacing:.03em}

/* ── NAV ── */
nav{padding:12px 10px;flex:1;overflow-y:auto}
.nav-group{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#4a5880;font-weight:700;padding:14px 12px 5px;font-family:"Lato"}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;cursor:pointer;font-size:13.5px;font-weight:400;color:#c8d4f0;transition:.13s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:rgba(34,176,225,.12);color:#fff}
.nav-item.active{background:var(--ub);color:#fff;box-shadow:0 4px 16px rgba(34,176,225,.35);font-weight:700}
.nav-item .ic{width:17px;height:17px;flex:none;opacity:.85}
.nav-item.active .ic{opacity:1}

/* ── SETTINGS PANEL ── */
.side-settings{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.set-row.col{flex-direction:column;align-items:stretch;gap:4px}
.set-lbl{font-size:10.5px;color:#7a90c8;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.lang-toggle{display:flex;border:1px solid rgba(255,255,255,.18);border-radius:7px;overflow:hidden}
.lang-toggle button{background:transparent;color:#c8d4f0;border:none;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:"Lato"}
.lang-toggle button.on{background:var(--ub);color:#fff}
.side-settings select,.rate-in{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:7px;padding:6px 9px;font-size:11.5px;width:100%;font-family:inherit}
.side-settings select option{color:var(--ink)}
.rate-in{width:80px;text-align:right}
.set-cur{font-size:10.5px;color:#7a90c8;margin-top:2px}.set-cur b{color:#c8d4f0}
.side-foot{padding:10px 16px;font-size:10px;color:#3a4a6a;border-top:1px solid rgba(255,255,255,.06)}

/* ── MAIN ── */
main{display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20;box-shadow:0 1px 0 var(--line)}
.topbar h1{font-size:19px;font-weight:700}
.topbar .crumb{font-size:10.5px;color:var(--lgray);text-transform:uppercase;letter-spacing:.12em;font-weight:700;display:block;margin-bottom:2px}
.topbar .actions{margin-left:auto;display:flex;gap:9px}
.content{padding:26px 28px 70px;max-width:1300px}
.view{display:none}.view.active{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── BUTTONS ── */
.btn{font-family:"Lato";font-weight:700;font-size:13px;border:none;border-radius:9px;padding:9px 16px;cursor:pointer;transition:.13s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
.btn-primary{background:var(--db);color:#fff}.btn-primary:hover{background:var(--db2)}
.btn-blue{background:var(--ub);color:#fff}.btn-blue:hover{background:var(--ub-d)}
.btn-green{background:var(--dg);color:#fff}.btn-green:hover{background:#004745}
.btn-ghost{background:#fff;color:var(--db);border:1px solid var(--line-d)}.btn-ghost:hover{background:var(--tint2)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-danger{background:#fff;color:var(--danger);border:1px solid #e8c4c0}.btn-danger:hover{background:#fbeae8}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.card-h h3{font-size:14.5px;font-weight:700}
.card-b{padding:18px 20px}
.footnote{font-size:11px;color:var(--muted);margin-top:11px}
.muted-note{font-size:12.5px;color:var(--muted)}

/* ── KPI ── */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--dg)}
.kpi.blue::after{background:var(--ub)}.kpi.navy::after{background:var(--db)}.kpi.amber::after{background:var(--amber)}.kpi.lime::after{background:var(--lg)}
.kpi .lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.kpi .val{font-family:"Lato";font-weight:900;font-size:27px;color:var(--ink);margin-top:6px;font-variant-numeric:tabular-nums}
.kpi .meta{font-size:11px;color:var(--muted);margin-top:3px}

/* ── LAYOUT ── */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row12{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}
@media(max-width:980px){.row2,.row12{grid-template-columns:1fr}}

/* ── CHARTS ── */
.bar-row{display:grid;grid-template-columns:134px 1fr 90px;align-items:center;gap:11px;margin-bottom:10px;font-size:12.5px}
.bar-row .blab{color:var(--ink);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{background:var(--tint);border-radius:5px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--db),var(--ub));transition:width .5s ease}
.bar-val{text-align:right;font-size:12px;color:var(--db);font-weight:700}

/* ── TABLES ── */
.tablecard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--db);color:rgba(255,255,255,.9);text-align:left;padding:11px 14px;font-family:"Lato";font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase}
thead th.r{text-align:right}
tbody td{padding:10px 14px;border-bottom:1px solid var(--line)}
tbody tr:nth-child(even){background:var(--tint2)}
tbody tr:hover{background:var(--tint)}
td.r{text-align:right}
.tcode{font-family:"Lato";font-weight:700;color:var(--ub-d);letter-spacing:.02em}
.clickrow{cursor:pointer}
.chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;font-family:"Lato";text-transform:uppercase;letter-spacing:.04em}
.chip.cerrada{background:var(--tint);color:var(--dg)}.chip.abierta{background:#fff8dd;color:#8a6a00}
.pill{display:inline-block;background:var(--tint);color:var(--db);font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px}

/* ── FILTERS ── */
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:11px;margin-bottom:16px}
label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
input,select{width:100%;padding:8px 11px;border:1px solid var(--line-d);border-radius:8px;font:inherit;font-size:13px;color:var(--ink);background:#fff;transition:.13s}
input:focus,select:focus{outline:none;border-color:var(--ub);box-shadow:0 0 0 3px rgba(34,176,225,.13)}
input[readonly]{background:var(--bg);color:var(--muted)}
.search{position:relative}.search input{padding-left:34px}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.45}
.empty{padding:38px;text-align:center;color:var(--muted);font-size:13.5px}

/* ── WIZARD ── */
.wiz{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}
@media(max-width:980px){.wiz{grid-template-columns:1fr}}
.form-sec{margin-bottom:20px}
.form-sec .sh{font-family:"Lato";font-weight:700;font-size:13.5px;color:var(--db);margin-bottom:13px;display:flex;align-items:center;gap:8px}
.form-sec .sh .n{width:21px;height:21px;border-radius:6px;background:var(--db);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:900}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:680px){.grid3,.grid2{grid-template-columns:1fr}}
.addbar{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:13px;display:grid;grid-template-columns:1fr 88px auto;gap:10px;align-items:end;margin-bottom:13px}
@media(max-width:680px){.addbar{grid-template-columns:1fr}}
.lineitem{display:flex;align-items:center;gap:9px;padding:8px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:7px;font-size:13px;background:#fff}
.lineitem .li-code{font-family:"Lato";font-weight:700;color:var(--ub-d);flex:none;font-size:12px}
.lineitem .li-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lineitem .li-qty{color:var(--muted);flex:none;font-size:12px}
.lineitem .li-tot{font-family:"Lato";font-weight:700;flex:none;min-width:88px;text-align:right}
.del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:17px;line-height:1;padding:2px 6px;border-radius:5px}
.del:hover{background:#fbeae8}
.livecard{position:sticky;top:86px}
.sumrow{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px dashed var(--line)}
.sumrow:last-of-type{border:none}
.sumrow.total{margin-top:4px;padding-top:10px;border-top:2px solid var(--db);font-family:"Lato";font-weight:900;font-size:16px;color:var(--db)}
.sumrow .num{font-weight:700}

/* ── DOC PAGE (estilo PDF del original) ── */
.docpage{background:#fff;border:2.5px solid var(--lg);border-radius:11px;padding:28px 30px;max-width:960px;margin:0 auto;box-shadow:var(--shadow)}
.docpage-head{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--tint3);padding-bottom:14px;margin-bottom:18px}
.docpage-title{flex:1}.docpage-title h2{font-size:19px;margin-top:3px}
.docpage-foot{font-size:10.5px;color:var(--muted);margin-top:20px;border-top:1px solid var(--line);padding-top:11px;text-align:center}
.meta{display:grid;grid-template-columns:repeat(3,1fr);gap:13px 22px;margin-bottom:6px}
@media(max-width:680px){.meta{grid-template-columns:1fr 1fr}}
.meta .m span{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;display:block}
.meta .m b{font-size:13.5px;font-weight:700}
.sec-title{font-family:"Lato";font-weight:700;font-size:13.5px;margin:22px 0 10px;color:var(--db);display:flex;align-items:center;gap:8px}
.sec-title::before{content:"";width:13px;height:2.5px;background:var(--lg)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(10,14,38,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(3px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fade .2s}
.modal-h{padding:17px 21px;border-bottom:1px solid var(--line)}.modal-h h3{font-size:15px}
.modal-b{padding:20px}.modal-f{padding:14px 21px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:9px}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;padding:11px 19px;border-radius:9px;font-size:13px;font-weight:700;opacity:0;transition:.28s;z-index:80;box-shadow:0 8px 24px rgba(0,0,0,.22)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── NOTICE CARD ── */
.notice{background:linear-gradient(135deg,var(--tint),#fff);border:1.5px solid var(--ub);border-radius:11px;padding:16px 20px;margin-bottom:18px;display:flex;gap:14px;align-items:flex-start}
.notice-icon{flex:none;width:28px;height:28px;background:var(--ub);border-radius:8px;display:grid;place-items:center}

@media print{aside,.topbar .actions,.no-print{display:none!important}.app{grid-template-columns:1fr}.content{padding:0}.docpage{box-shadow:none}}
</style>
</head>
<body>
<div class="app">
<aside>
  <div class="brand">
    <svg width="34" height="34" viewBox="0 0 40 40" fill="none">
      <rect width="40" height="40" rx="9" fill="#22B0E1"/>
      <text x="20" y="28" text-anchor="middle" font-family="Lato,sans-serif" font-weight="900" font-size="22" fill="#fff">U</text>
    </svg>
    <div>
      <div class="brand-logo"><span class="ubi">ubi</span><span class="cquia">cquia</span><span class="dot">.</span></div>
      <div class="brand-sub" id="brand_sub_txt">Work Order Management</div>
    </div>
  </div>
  <nav>
    <div class="nav-group" data-i18n="grp_ops">Operación</div>
    <button class="nav-item active" data-view="dashboard" onclick="nav('dashboard')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span data-i18n="nav_dashboard">Panel</span></button>
    <button class="nav-item" data-view="orders" onclick="nav('orders')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><span data-i18n="nav_orders">Órdenes</span></button>
    <button class="nav-item" data-view="new" onclick="nav('new')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg><span data-i18n="nav_new">Nueva orden</span></button>
    <div class="nav-group" data-i18n="grp_master">Datos maestros</div>
    <button class="nav-item" data-view="actividades" onclick="nav('actividades')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span data-i18n="nav_actcat">Catálogo actividades</span></button>
    <button class="nav-item" data-view="materiales" onclick="nav('materiales')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.7l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.7l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg><span data-i18n="nav_matcat">Catálogo materiales</span></button>
    <div class="nav-group" data-i18n="grp_analysis">Análisis</div>
    <button class="nav-item" data-view="reportes" onclick="nav('reportes')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg><span data-i18n="nav_report">Reporte integrado</span></button>
    <button class="nav-item" data-view="basedatos" onclick="nav('basedatos')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></svg><span data-i18n="nav_db">Base de datos</span></button>
  </nav>
  <div class="side-settings" id="settings"></div>
  <div class="side-foot">ubicquia. · <span data-i18n="foot_ver">v2.1</span></div>
</aside>

<main>
  <div class="topbar">
    <div><span class="crumb" id="crumb"></span><h1 id="ptitle"></h1></div>
    <div class="actions" id="topActions"></div>
  </div>
  <div class="content">
    <section class="view active" id="v-dashboard"></section>
    <section class="view" id="v-orders"></section>
    <section class="view" id="v-new"></section>
    <section class="view" id="v-detalle"></section>
    <section class="view" id="v-actividades"></section>
    <section class="view" id="v-materiales"></section>
    <section class="view" id="v-reportes"></section>
    <section class="view" id="v-basedatos"></section>
  </div>
</main>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-h"><h3 id="modalTitle"></h3></div>
    <div class="modal-b">
      <div style="margin-bottom:13px"><label id="ml_code">Código</label><input id="mi_code"></div>
      <div style="margin-bottom:13px"><label id="ml_desc">Descripción</label><input id="mi_desc"></div>
      <div><label id="ml_price">Precio</label><input id="mi_price" type="number" step="0.01" min="0"></div>
      <input type="hidden" id="mi_kind"><input type="hidden" id="mi_orig">
    </div>
    <div class="modal-f">
      <button class="btn btn-ghost" id="mbtn_cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-blue" id="mbtn_save" onclick="saveItem()">Guardar</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
/* ===== COUNTRIES & REGIONAL ===== */
const COUNTRIES=[
  {code:"CA",en:"Canada",       es:"Canadá",           cur:"CAD",sym:"$",  tax:"GST",  rate:5},
  {code:"US",en:"United States",es:"Estados Unidos",   cur:"USD",sym:"$",  tax:"Tax",  rate:0},
  {code:"MX",en:"Mexico",       es:"México",           cur:"MXN",sym:"$",  tax:"IVA",  rate:16},
  {code:"GT",en:"Guatemala",    es:"Guatemala",        cur:"GTQ",sym:"Q",  tax:"IVA",  rate:12},
  {code:"BZ",en:"Belize",       es:"Belice",           cur:"BZD",sym:"$",  tax:"GST",  rate:12.5},
  {code:"SV",en:"El Salvador",  es:"El Salvador",      cur:"USD",sym:"$",  tax:"IVA",  rate:13},
  {code:"HN",en:"Honduras",     es:"Honduras",         cur:"HNL",sym:"L",  tax:"ISV",  rate:15},
  {code:"NI",en:"Nicaragua",    es:"Nicaragua",        cur:"NIO",sym:"C$", tax:"IVA",  rate:15},
  {code:"CR",en:"Costa Rica",   es:"Costa Rica",       cur:"CRC",sym:"₡",  tax:"IVA",  rate:13},

const KEY="ub_wo_v2";
let DB;
function save(){try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}}
function load(){
  try{DB=JSON.parse(localStorage.getItem(KEY));}catch(e){DB=null;}
  if(!DB||!Array.isArray(DB.act)){DB={act:SEED_ACT,mat:SEED_MAT,ord:[],dbcfg:{vendor:"",engine:"",type:""},ver:2};save();return;}

/* ===== CATALOGS ===== */
function cleanPrice(v){if(typeof v==="number")return v;let s=String(v).replace(/[^0-9.,-]/g,"").trim();if(s.includes(",")&&s.includes("."))s=s.replace(/,/g,"");else if(s.includes(","))s=s.replace(/\./g,"").replace(",",".");const n=parseFloat(s);return isNaN(n)?null:n;}
function parseCSV(text){text=text.replace(/\r/g,"");const first=(text.split("\n").find(l=>l.trim())||"");const delim=(first.split(";").length>first.split(",").length)?";":",";
return text.split("\n").map(line=>{const cells=[];let cur="",q=false,start=true;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else if(start){q=true;}else{cur+='"';}start=false;}else if(ch===delim&&!q){cells.push(cur);cur="";start=true;}else{cur+=ch;start=false;}}cells.push(cur);return cells;});}
function rowsToCatalog(rows){const out=[];(rows||[]).forEach(r=>{const cells=(r||[]).map(c=>c==null?"":String(c).trim());while(cells.length&&cells[cells.length-1]==="")cells.pop();if(!cells.length)return;let pi=-1,price=null;for(let i=cells.length-1;i>=0;i--){if(/\d/.test(cells[i])){const n=cleanPrice(cells[i]);if(n!=null){pi=i;price=n;break;}}}if(pi<1)return;const code=cells[0];if(!code||/^[ií]tem$|^c[oó]digo$|^item$|^code$/i.test(code))return;const desc=cells.slice(1,pi).join(" ").trim()||code;out.push({codigo:code,desc,precio:price});});return out;}
function readFileRows(file,cb){const ext=file.name.split(".").pop().toLowerCase();if(ext==="csv"||ext==="txt"){const rd=new FileReader();rd.onload=e=>cb(rowsToCatalog(parseCSV(e.target.result)));rd.readAsText(file,"utf-8");}else if(ext==="xlsx"||ext==="xls"){if(typeof XLSX==="undefined"){alert(T("toast_xlsx_online"));return;}const rd=new FileReader();rd.onload=e=>{const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});const ws=wb.Sheets[wb.SheetNames[0]];cb(rowsToCatalog(XLSX.utils.sheet_to_json(ws,{header:1,defval:""})));};rd.readAsArrayBuffer(file);}else alert(T("toast_fmt"));}
function tplCSV(kind){const head=kind==="act"?[T("th_item"),T("th_descr_act"),T("th_price_notax")]:[T("th_item"),T("th_descr_mat"),T("th_price_notax")];const ex=kind==="act"?[["APG01","Apertura de agujero para poste","353.76"]]:[["310391","Cable Duplex 6 ACSR con forro","100.00"]];const csv="\uFEFF"+[head,...ex].map(r=>r.map(c=>`"${c}"`).join(";")).join("\n");const b=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=(kind==="act"?"template_activities":"template_materials")+".csv";a.click();}
let acState={q:""},maState={q:""};
function catBar(kind,q){const fill=kind==="act"?"acState.q=this.value;fillActCat()":"maState.q=this.value;fillMatCat()";return`<div class="filters" style="grid-template-columns:1fr auto"><div class="search"><label>${T("f_search")}</label>${searchSvg}<input value="${esc(q)}" placeholder="${kind==="act"?T("ph_search_act"):T("ph_search_mat")}" oninput="${fill}"></div><div style="display:flex;align-items:end;gap:8px;flex-wrap:wrap"><label class="btn btn-primary" style="cursor:pointer">${T("btn_import")}<input type="file" accept=".csv,.xlsx,.xls,.txt" style="display:none" onchange="onPick(this,'${kind}')"></label><button class="btn btn-ghost" onclick="tplCSV('${kind}')">${T("btn_template")}</button><button class="btn btn-blue" onclick="openItemModal('${kind}')">${T("btn_newf")}</button></div></div>`;}
function renderActCat(){$("v-actividades").innerHTML=catBar("act",acState.q)+`<div id="actCatTable"></div>`;fillActCat();}
function fillActCat(){const q=acState.q.toLowerCase();const list=DB.act.filter(a=>a.codigo.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q));$("actCatTable").innerHTML=`<div class="tablecard"><table><thead><tr><th>${T("th_item")}</th><th>${T("th_descr_act")}</th><th class="r">${T("th_price_notax")}</th><th class="r">${T("th_actions")}</th></tr></thead><tbody>${list.length?list.map(a=>`<tr><td class="tcode">${a.codigo}</td><td>${a.desc}</td><td class="r num">${money(a.precio)}</td><td class="r"><button class="btn btn-ghost btn-sm" onclick="editItem('act','${a.codigo}')">${T("btn_edit")}</button> <button class="btn btn-danger btn-sm" onclick="delCatItem('act','${a.codigo}')">${T("btn_delete")}</button></td></tr>`).join(""):`<tr><td colspan="4" class="empty">${T("cat_no_results")}</td></tr>`}</tbody></table></div><p class="footnote">${DB.act.length} ${T("actcat_foot")}</p>`;}
function renderMatCat(){$("v-materiales").innerHTML=catBar("mat",maState.q)+`<div id="matCatTable"></div>`;fillMatCat();}
function fillMatCat(){const q=maState.q.toLowerCase();const list=DB.mat.filter(m=>m.codigo.toLowerCase().includes(q)||m.desc.toLowerCase().includes(q));$("matCatTable").innerHTML=`<div class="tablecard"><table><thead><tr><th>${T("th_item")}</th><th>${T("th_descr_mat")}</th><th class="r">${T("th_price_notax")}</th><th class="r">${T("th_actions")}</th></tr></thead><tbody>${list.length?list.map(m=>`<tr><td class="tcode">${m.codigo}</td><td>${m.desc}</td><td class="r num">${money(m.precio)}</td><td class="r"><button class="btn btn-ghost btn-sm" onclick="editItem('mat','${m.codigo}')">${T("btn_edit")}</button> <button class="btn btn-danger btn-sm" onclick="delCatItem('mat','${m.codigo}')">${T("btn_delete")}</button></td></tr>`).join(""):`<tr><td colspan="4" class="empty">${T("cat_no_results")}</td></tr>`}</tbody></table></div><p class="footnote">${DB.mat.length} ${T("matcat_foot")}</p>`;}
function onPick(input,target){const f=input.files[0];if(f)readFileRows(f,rows=>{if(!rows.length){toast(T("toast_no_valid")+' "'+f.name+'"');return;}if(target==="act")DB.act=rows;else DB.mat=rows;save();toast(rows.length+" "+(target==="act"?T("toast_imported_acts"):T("toast_imported_mats")));render();});input.value="";}
function openItemModal(kind){$("mi_kind").value=kind;$("mi_orig").value="";$("modalTitle").textContent=kind==="act"?T("modal_new_act"):T("modal_new_mat");$("mi_code").value="";$("mi_desc").value="";$("mi_price").value="";$("mi_code").readOnly=false;setModalLabels();$("modalBg").classList.add("open");}
function editItem(kind,code){const it=(kind==="act"?DB.act:DB.mat).find(x=>x.codigo===code);$("mi_kind").value=kind;$("mi_orig").value=code;$("modalTitle").textContent=kind==="act"?T("modal_edit_act"):T("modal_edit_mat");$("mi_code").value=it.codigo;$("mi_desc").value=it.desc;$("mi_price").value=it.precio;$("mi_code").readOnly=true;setModalLabels();$("modalBg").classList.add("open");}
function setModalLabels(){$("ml_code").textContent=T("lbl_code");$("ml_desc").textContent=T("lbl_descr");$("ml_price").textContent=T("lbl_price");$("mbtn_cancel").textContent=T("btn_cancel");$("mbtn_save").textContent=T("btn_save");}
function closeModal(){$("modalBg").classList.remove("open");}
function saveItem(){const kind=$("mi_kind").value,orig=$("mi_orig").value;const code=$("mi_code").value.trim(),desc=$("mi_desc").value.trim(),price=parseFloat($("mi_price").value);if(!code||!desc||isNaN(price)){toast(T("toast_complete"));return;}const arr=kind==="act"?DB.act:DB.mat;if(orig){const it=arr.find(x=>x.codigo===orig);it.desc=desc;it.precio=price;}else{if(arr.some(x=>x.codigo===code)){toast(T("toast_code_exists"));return;}arr.push({codigo:code,desc,precio:price});}save();closeModal();toast(T("toast_cat_updated"));render();}
function delCatItem(kind,code){const used=DB.ord.some(o=>(kind==="act"?o.acts:o.mats).some(l=>l[0]===code));if(used){toast(T("toast_in_use"));return;}if(!confirm(T("confirm_delete")+" "+code+"?"))return;if(kind==="act")DB.act=DB.act.filter(x=>x.codigo!==code);else DB.mat=DB.mat.filter(x=>x.codigo!==code);save();render();toast(T("toast_deleted"));}

/* ===== REPORTS ===== */
let rState={contr:"",dist:"",estado:"",min:"",d1:"2025-01-01",d2:"2030-12-31"};
function renderReportes(){const contr=[...new Set(DB.ord.map(o=>o.contratista))].sort();const dist=[...new Set(DB.ord.map(o=>o.distrito))].sort();$("v-reportes").innerHTML=`<div class="card no-print" style="margin-bottom:18px"><div class="card-h"><h3>${T("filt_title")}</h3></div><div class="card-b"><div class="filters" style="margin:0"><div><label>${T("lbl_date_from")}</label><input type="date" value="${rState.d1}" onchange="rState.d1=this.value;computeReport()"></div><div><label>${T("lbl_date_to")}</label><input type="date" value="${rState.d2}" onchange="rState.d2=this.value;computeReport()"></div><div><label>${T("f_contractor")}</label><select onchange="rState.contr=this.value;computeReport()"><option value="">${T("opt_all")}</option>${contr.map(c=>`<option${c===rState.contr?" selected":""}>${c}</option>`).join("")}</select></div><div><label>${T("f_district")}</label><select onchange="rState.dist=this.value;computeReport()"><option value="">${T("opt_all")}</option>${dist.map(c=>`<option${c===rState.dist?" selected":""}>${c}</option>`).join("")}</select></div><div><label>${T("f_status")}</label><select onchange="rState.estado=this.value;computeReport()"><option value="">${T("opt_all")}</option><option value="Cerrada"${rState.estado==="Cerrada"?" selected":""}>${T("status_closed")}</option><option value="Abierta"${rState.estado==="Abierta"?" selected":""}>${T("status_open")}</option></select></div><div><label>${T("lbl_costmin")}</label><input type="number" value="${rState.min}" oninput="rState.min=this.value;computeReport()"></div></div></div></div><div id="reportBody"></div>`;computeReport();}
function filteredReportOrders(){return DB.ord.filter(o=>{if(rState.d1&&o.fecha<rState.d1)return false;if(rState.d2&&o.fecha>rState.d2)return false;if(rState.contr&&o.contratista!==rState.contr)return false;if(rState.dist&&o.distrito!==rState.dist)return false;if(rState.estado&&o.estado!==rState.estado)return false;if(rState.min&&orderTotals(o).sub<parseFloat(rState.min))return false;return true;}).sort((a,b)=>b.fecha.localeCompare(a.fecha));}
function computeReport(){const list=filteredReportOrders();const a=aggregate(list);$("reportBody").innerHTML=`<div class="docpage"><div class="docpage-head"><svg width="26" height="26" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="#22B0E1"/><text x="20" y="28" text-anchor="middle" font-family="Lato,sans-serif" font-weight="900" font-size="22" fill="#fff">U</text></svg><div class="docpage-title"><span class="eyebrow">${T("nav_report")}</span><h2>${T("exec_summary")}</h2></div></div>
<div class="kgrid"><div class="kpi navy"><div class="lbl">${T("kpi_orders")}</div><div class="val">${a.nOrd}</div></div><div class="kpi"><div class="lbl">${T("kpi_acts")}</div><div class="val">${a.nAct}</div></div><div class="kpi blue"><div class="lbl">${T("kpi_mats")}</div><div class="val">${a.nMat}</div></div><div class="kpi amber"><div class="lbl">${T("kpi_total_tax")}</div><div class="val" style="font-size:20px">${money(a.total)}</div></div></div>
<div class="row12"><div class="tablecard"><table><thead><tr><th>${T("th_order")}</th><th>${T("th_date")}</th><th>${T("th_contractor")}</th><th class="r">${T("th_acts")}</th><th class="r">${T("th_cact")}</th><th class="r">${T("th_cmat")}</th><th class="r">${T("th_total")}</th></tr></thead><tbody>${list.length?list.map(o=>{const t=orderTotals(o);return`<tr class="clickrow" onclick="openDetalle('${o.ot}')"><td class="tcode">${o.ot}</td><td>${o.fecha}</td><td>${o.contratista}</td><td class="r num">${t.qAct}</td><td class="r num">${money(t.ca)}</td><td class="r num">${money(t.cm)}</td><td class="r num">${money(t.total)}</td></tr>`;}).join(""):`<tr><td colspan="7" class="empty">${T("report_no_match")}</td></tr>`}</tbody></table></div><div class="card"><div class="card-h"><h3>${T("exec_summary")}</h3></div><div class="card-b"><div class="sumrow"><span>${T("cost_acts")}</span><span class="num">${money(a.ca)}</span></div><div class="sumrow"><span>${T("cost_mats")}</span><span class="num">${money(a.cm)}</span></div><div class="sumrow"><span>${T("sum_sub")}</span><span class="num">${money(a.sub)}</span></div><div class="sumrow"><span>${taxLabel()} (${RATE}%)</span><span class="num">${money(a.tax)}</span></div><div class="sumrow total"><span>${T("sum_total")}</span><span class="num">${money(a.total)}</span></div><div class="sumrow" style="margin-top:12px"><span>${T("kpi_avg")}</span><span class="num">${money(a.nOrd?a.sub/a.nOrd:0)}</span></div></div></div></div>
<p class="docpage-foot">${T("report_generated")} ${new Date().toLocaleString(LANG==="es"?"es-CL":"en-US")} · ${country()[LANG==="es"?"es":"en"]} · ${country().cur}</p></div>`;}

/* ===== CSV EXPORT ===== */
function downloadCSV(rows,name){const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");const b=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();}
function exportReportCSV(){const list=filteredReportOrders();const cur=country().cur;const L=[[T("nav_report"),cur],[T("th_order"),T("th_date"),T("th_contractor"),T("th_district"),T("th_status"),T("cost_acts"),T("cost_mats"),T("sum_sub"),taxLabel(),T("sum_total")]];list.forEach(o=>{const t=orderTotals(o);L.push([o.ot,o.fecha,o.contratista,o.distrito,statusLabel(o.estado),t.ca.toFixed(2),t.cm.toFixed(2),t.sub.toFixed(2),t.tax.toFixed(2),t.total.toFixed(2)]);});downloadCSV(L,"report.csv");}
function exportOrderCSV(ot){const o=DB.ord.find(x=>x.ot===ot);const t=orderTotals(o);const cur=country().cur;const L=[[T("detail_title"),cur],[T("th_order"),o.ot,T("th_date"),o.fecha,T("th_status"),statusLabel(o.estado)],[T("lbl_contractor"),o.contratista,T("lbl_technician"),o.tecnico,T("lbl_district"),o.distrito],[],[T("sec_acts")],[T("th_code"),T("th_descr"),T("th_qty"),T("th_unit"),T("th_cost")]];o.acts.forEach(([c,q])=>L.push([c,actDesc(c),q,actPrice(c).toFixed(2),(actPrice(c)*q).toFixed(2)]));L.push([],[T("sec_mats")],[T("th_code"),T("th_descr"),T("th_qty"),T("th_unit"),T("th_cost")]);o.mats.forEach(([c,q])=>L.push([c,matDesc(c),q,matPrice(c).toFixed(2),(matPrice(c)*q).toFixed(2)]));L.push([],[T("sum_sub"),t.sub.toFixed(2)],[taxLabel()+" "+RATE+"%",t.tax.toFixed(2)],[T("sum_total"),t.total.toFixed(2)]);downloadCSV(L,ot+".csv");}

/* ===== DATABASE ===== */
function renderDB(){const c=DB.dbcfg;$("v-basedatos").innerHTML=`<div class="row12"><div class="card"><div class="card-h"><div><span class="eyebrow">${T("db_eyebrow")}</span><h3>${T("db_title")}</h3></div></div><div class="card-b"><p style="font-size:13px;color:var(--muted);margin:0 0 16px">${T("db_intro")}</p><div style="margin-bottom:13px"><label>${T("lbl_db_vendor")}</label><input id="db_vendor" value="${esc(c.vendor)}"></div><div style="margin-bottom:13px"><label>${T("lbl_db_engine")}</label><input id="db_engine" value="${esc(c.engine)}"></div><div style="margin-bottom:16px"><label>${T("lbl_db_type")}</label><select id="db_type"><option value="">—</option><option value="sql_rel"${c.type==="sql_rel"?" selected":""}>${T("opt_sql_rel")}</option><option value="nosql"${c.type==="nosql"?" selected":""}>${T("opt_nosql")}</option><option value="sql"${c.type==="sql"?" selected":""}>${T("opt_sql")}</option><option value="equiv"${c.type==="equiv"?" selected":""}>${T("opt_equiv")}</option></select></div><button class="btn btn-blue" onclick="saveCfg()">${T("btn_save_cfg")}</button></div></div><div class="card"><div class="card-h"><h3>${T("loaded_title")}</h3></div><div class="card-b"><div class="sumrow"><span>${T("lbl_orders_count")}</span><span class="num">${DB.ord.length}</span></div><div class="sumrow"><span>${T("lbl_acts_count")}</span><span class="num">${DB.act.length}</span></div><div class="sumrow"><span>${T("lbl_mats_count")}</span><span class="num">${DB.mat.length}</span></div><div class="sumrow"><span>${T("lbl_storage")}</span><span class="pill">localStorage</span></div><p style="font-size:12px;color:var(--muted);margin:14px 0 11px">${T("db_note")}</p><button class="btn btn-danger" onclick="clearAll()">${T("btn_clear_orders")}</button></div></div></div>`;}
function saveCfg(){DB.dbcfg={vendor:$("db_vendor").value,engine:$("db_engine").value,type:$("db_type").value};save();toast(T("toast_cfg_saved"));}
function clearAll(){if(confirm(T("confirm_clear"))){DB.ord=[];save();render();toast(T("toast_cleared"));}}

/* ===== INIT ===== */
$("modalBg").addEventListener("click",e=>{if(e.target===$("modalBg"))closeModal();});
load(); applyI18n(); renderSettings(); render();
</script>
</body>
</html>
