<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simply — Sistema de Movilidad</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Lato',Arial,sans-serif;background:#EEF0F5;color:#1E2445;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
    .box{background:#fff;border:1px solid #d8dde9;border-top:4px solid #22B0E1;border-radius:14px;padding:2.5rem;max-width:520px;box-shadow:0 8px 32px rgba(30,58,123,.08)}
    h1{font-size:1.4rem;margin-bottom:.6rem}
    h1 em{font-style:normal;color:#22B0E1}
    p{color:#464D63;line-height:1.55;font-size:.9rem;margin-bottom:1rem}
    code{background:#f5f7fb;border:1px solid #d8dde9;border-radius:6px;padding:.15rem .4rem;font-size:.82rem;color:#005B59}
    a{display:inline-block;margin-top:.5rem;color:#22B0E1;font-weight:700;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h1>Versión <em>Simply</em></h1>
    <p>Este es un marcador de posición. Reemplaza este archivo por tu app <b>Simply</b> real.</p>
    <p>Solo cópiala aquí con el nombre <code>index.html</code> en la carpeta <code>sistema-movilidad/simply/</code> y se abrirá automáticamente.</p>
    <a href="../">← Volver al menú</a>
  </div>
</body>
</html>
